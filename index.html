<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>顕微鏡カメラ</title>
  <style>
    :root {
      --brightness: 1;
      --contrast: 1;
      --saturate: 1;
      --grayscale: 0;

      --bg: #eaf6fb;
      --bg2: #dff1f8;
      --line: #d2e4ec;
      --text: #17313b;
      --muted: #5f7b86;
      --title: #12303a;

      --primary: #1f7a8c;
      --primary-dark: #176877;
      --secondary: #4f9cb0;
      --secondary-dark: #2e8094;
      --menu: #7486db;
      --menu-dark: #5e70c8;
      --danger: #d84c4c;
      --danger-dark: #b93a3a;

      --shadow-sm: 0 6px 18px rgba(62, 109, 128, 0.08);
      --shadow-lg: 0 18px 40px rgba(62, 109, 128, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }

    body {
      padding: 14px;
    }

    .page-shell {
      width: min(96%, 1460px);
      margin: 0 auto;
    }

    .app-header {
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .app-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .app-title {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 30px);
      line-height: 1.1;
      color: var(--title);
      font-weight: 800;
    }

    .header-logo {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 8px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(210, 228, 236, 0.95);
      box-shadow: var(--shadow-sm);
      color: #17313b;
      user-select: none;
      white-space: nowrap;
    }

    .header-logo img {
      display: block;
      max-height: 40px;
      width: auto;
      object-fit: contain;
    }

    .header-logo-text {
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      font-family: "Times New Roman", Georgia, serif;
      font-style: italic;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 260px;
      gap: 14px;
      align-items: start;
    }

    .panel,
    .viewer-card {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(210, 228, 236, 0.95);
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
    }

    .panel {
      padding: 10px;
      max-height: calc(100vh - 42px);
      overflow: auto;
      position: sticky;
      top: 10px;
    }

    .viewer-card {
      padding: 12px;
      overflow: hidden;
      min-height: 300px;
    }

    .viewer {
      position: relative;
      width: 100%;
      max-width: 880px;
      margin: 0 auto;
      background: linear-gradient(180deg, #0f1418, #050708);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #b7cbd5;
    }

    #video {
      display: block;
      width: 100%;
      height: auto;
      max-height: 68vh;
      background: #000;
      filter:
        brightness(var(--brightness))
        contrast(var(--contrast))
        saturate(var(--saturate))
        grayscale(var(--grayscale));
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      touch-action: none;
    }

    #captureCanvas {
      display: none;
    }

    .panel-box {
      background: linear-gradient(180deg, #fcfeff, #f4fafc);
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 9px;
      margin-bottom: 8px;
    }

    .panel-box:last-child {
      margin-bottom: 0;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 800;
      color: var(--title);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    button, select, input {
      font-size: 12px;
      border: 1px solid transparent;
      border-radius: 9px;
      transition: 0.18s ease;
    }

    button {
      cursor: pointer;
      color: #fff;
      padding: 7px 9px;
      font-weight: 700;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      min-height: 32px;
      line-height: 1.2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.10);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }

    button.secondary {
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
    }

    button.menu-btn {
      background: linear-gradient(135deg, var(--menu), var(--menu-dark));
    }

    button.warn {
      background: linear-gradient(135deg, var(--danger), var(--danger-dark));
    }

    button.gray {
      background: linear-gradient(135deg, #7f96a1, #647985);
    }

    button.capture-red {
      background: linear-gradient(135deg, #ef5350, #d63c3c);
    }

    button.recording {
      background: linear-gradient(135deg, #b71c1c, #8f1111);
      box-shadow: 0 0 0 4px rgba(183, 28, 28, 0.15);
    }

    button.active-tool {
      outline: 2px solid rgba(44, 143, 163, 0.2);
      box-shadow: 0 0 0 1px rgba(44, 143, 163, 0.2), 0 8px 16px rgba(44, 143, 163, 0.14);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    select, input {
      width: 100%;
      background: #fff;
      color: var(--text);
      padding: 7px 8px;
      border-color: var(--line);
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
      min-height: 32px;
    }

    select:focus, input:focus {
      border-color: #7cb9ca;
      box-shadow: 0 0 0 4px rgba(124, 185, 202, 0.18);
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      margin-top: 2px;
    }

    .inline-check input[type="checkbox"] {
      width: auto;
      min-height: auto;
      padding: 0;
      box-shadow: none;
    }

    .accordion {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fff;
      overflow: hidden;
      margin-bottom: 7px;
    }

    .accordion:last-child {
      margin-bottom: 0;
    }

    .accordion-header {
      width: 100%;
      border: none;
      border-radius: 0;
      background: linear-gradient(180deg, #f7fcfe, #eef7fb);
      color: var(--title);
      box-shadow: none;
      justify-content: space-between;
      padding: 8px 10px;
      font-size: 12px;
      min-height: 34px;
    }

    .accordion-header:hover {
      transform: none;
      box-shadow: none;
      background: linear-gradient(180deg, #f2fbfe, #eaf5fa);
    }

    .accordion-arrow {
      color: var(--muted);
      font-size: 12px;
    }

    .accordion-body {
      display: none;
      padding: 8px;
      border-top: 1px solid #e7f1f5;
      background: #fbfeff;
    }

    .accordion-body.open {
      display: block;
    }

    .menu-row {
      margin: 6px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .menu-row.equal > * {
      flex: 1 1 calc(50% - 6px);
    }

    .menu-row input[type="number"] {
      width: 90px;
    }

    .menu-note {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
      margin-top: 8px;
      padding: 7px 8px;
      background: #eef7fa;
      border: 1px solid #d7eaf1;
      border-radius: 9px;
    }

    .info-box {
      background: #f4fafc;
      border: 1px solid #dfedf3;
      border-radius: 10px;
      padding: 7px 8px;
      margin-top: 7px;
    }

    .info-box .label {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      display: block;
    }

    .info-box .value {
      color: var(--title);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.4;
      word-break: break-word;
    }

    .filter-item {
      margin: 7px 0 9px;
      padding: 7px;
      border: 1px solid #deedf3;
      border-radius: 10px;
      background: #fafdff;
    }

    .filter-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--title);
    }

    .filter-slider {
      width: 100%;
      min-height: auto;
      padding: 0;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: 9px;
      max-height: 240px;
      overflow: auto;
      padding-right: 2px;
    }

    .slot-card {
      background: linear-gradient(180deg, #ffffff, #f6fbfd);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px;
      box-shadow: var(--shadow-sm);
    }

    .slot-name-input {
      width: 100%;
      margin-bottom: 5px;
      padding: 6px 7px;
      font-size: 11px;
      border-radius: 8px;
      min-height: 28px;
    }

    .slot-title {
      font-size: 11px;
      color: var(--title);
      margin-bottom: 4px;
      font-weight: 800;
    }

    .slot-meta {
      font-size: 10px;
      color: var(--muted);
      min-height: 34px;
      margin-bottom: 6px;
      line-height: 1.4;
      white-space: pre-line;
      background: #f4fafc;
      border: 1px solid #dfedf3;
      border-radius: 8px;
      padding: 6px;
    }

    .slot-actions {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .slot-actions button {
      flex: 1 1 calc(50% - 5px);
      padding: 5px 6px;
      font-size: 10px;
      min-height: 26px;
    }

    .viewer-status {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-card {
      background: linear-gradient(180deg, #fcfeff, #f4fafc);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .status-value {
      color: var(--title);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
    }

    @media (max-width: 1200px) {
      .main-layout {
        grid-template-columns: 240px minmax(0, 1fr) 240px;
      }
    }

    @media (max-width: 1024px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
        max-height: none;
      }

      .viewer {
        max-width: 100%;
      }

      .app-header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-logo {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="app-header">
      <div class="app-brand">
        <h1 class="app-title">顕微鏡カメラ</h1>
      </div>
      <div class="header-logo" aria-label="Ken's ロゴ">
        <img src="img/ケニスロゴ２.png" alt="Ken's ロゴ">
      </div>
    </div>

    <div class="main-layout">
      <aside class="panel">
        <div class="panel-box">
          <h3 class="panel-title">メニュー</h3>

          <div class="accordion">
            <button class="accordion-header" type="button" data-target="measureMenu">
              <span>計測</span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div id="measureMenu" class="accordion-body">
              <div class="menu-row equal">
                <button id="drawLineButton" class="secondary" type="button">直線</button>
                <button id="drawRectButton" class="secondary" type="button">長方形</button>
                <button id="drawCircleButton" class="secondary" type="button">円</button>
                <button id="undoShapeButton" class="secondary" type="button">戻る</button>
              </div>
              <div class="menu-row">
                <button id="measureClearButton" class="gray" type="button">計測クリア</button>
              </div>
              <div class="menu-note">
                直線は長さ、長方形は幅と高さ、円は半径を表示します。
              </div>
            </div>
          </div>

          <div class="accordion">
            <button class="accordion-header" type="button" data-target="calibrationMenu">
              <span>校正</span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div id="calibrationMenu" class="accordion-body">
              <div class="menu-row equal">
                <button id="calibrationModeButton" class="menu-btn" type="button">校正モード</button>
                <button id="exitCalibrationModeButton" class="gray" type="button">校正解除</button>
              </div>
              <div class="menu-row">
                <input type="number" id="calibrationLength" min="0" step="any" value="1">
                <select id="calibrationUnit">
                  <option value="mm">mm</option>
                  <option value="um">µm</option>
                </select>
              </div>
              <div class="menu-row equal">
                <button id="applyCalibrationButton" class="menu-btn" type="button">適用</button>
                <button id="clearCalibrationButton" class="warn" type="button">クリア</button>
              </div>

              <div class="info-box">
                <span class="label">校正値</span>
                <div id="calibrationValueText" class="value">未校正</div>
              </div>

              <div class="info-box">
                <span class="label">校正線ピクセル長</span>
                <div id="calibrationPixelLength" class="value">未設定</div>
              </div>

              <div class="slot-grid">
                <div class="slot-card">
                  <input id="slotName1" class="slot-name-input" type="text" placeholder="スロット1の名前">
                  <div id="slotTitle1" class="slot-title">校正スロット 1</div>
                  <div id="slotMeta1" class="slot-meta">未保存</div>
                  <div class="slot-actions">
                    <button data-slot="1" class="gray rename-slot-button" type="button">名前保存</button>
                    <button data-slot="1" class="gray save-slot-button" type="button">保存</button>
                    <button data-slot="1" class="secondary load-slot-button" type="button">読込</button>
                    <button data-slot="1" class="warn clear-slot-button" type="button">消去</button>
                  </div>
                </div>

                <div class="slot-card">
                  <input id="slotName2" class="slot-name-input" type="text" placeholder="スロット2の名前">
                  <div id="slotTitle2" class="slot-title">校正スロット 2</div>
                  <div id="slotMeta2" class="slot-meta">未保存</div>
                  <div class="slot-actions">
                    <button data-slot="2" class="gray rename-slot-button" type="button">名前保存</button>
                    <button data-slot="2" class="gray save-slot-button" type="button">保存</button>
                    <button data-slot="2" class="secondary load-slot-button" type="button">読込</button>
                    <button data-slot="2" class="warn clear-slot-button" type="button">消去</button>
                  </div>
                </div>

                <div class="slot-card">
                  <input id="slotName3" class="slot-name-input" type="text" placeholder="スロット3の名前">
                  <div id="slotTitle3" class="slot-title">校正スロット 3</div>
                  <div id="slotMeta3" class="slot-meta">未保存</div>
                  <div class="slot-actions">
                    <button data-slot="3" class="gray rename-slot-button" type="button">名前保存</button>
                    <button data-slot="3" class="gray save-slot-button" type="button">保存</button>
                    <button data-slot="3" class="secondary load-slot-button" type="button">読込</button>
                    <button data-slot="3" class="warn clear-slot-button" type="button">消去</button>
                  </div>
                </div>

                <div class="slot-card">
                  <input id="slotName4" class="slot-name-input" type="text" placeholder="スロット4の名前">
                  <div id="slotTitle4" class="slot-title">校正スロット 4</div>
                  <div id="slotMeta4" class="slot-meta">未保存</div>
                  <div class="slot-actions">
                    <button data-slot="4" class="gray rename-slot-button" type="button">名前保存</button>
                    <button data-slot="4" class="gray save-slot-button" type="button">保存</button>
                    <button data-slot="4" class="secondary load-slot-button" type="button">読込</button>
                    <button data-slot="4" class="warn clear-slot-button" type="button">消去</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="accordion">
            <button class="accordion-header" type="button" data-target="filterMenu">
              <span>画質</span>
              <span class="accordion-arrow">▼</span>
            </button>
            <div id="filterMenu" class="accordion-body">
              <div class="filter-item">
                <div class="filter-head">
                  <span>明るさ</span>
                  <span id="brightnessValue">100%</span>
                </div>
                <input class="filter-slider" type="range" id="brightness" min="50" max="200" value="100">
              </div>

              <div class="filter-item">
                <div class="filter-head">
                  <span>コントラスト</span>
                  <span id="contrastValue">100%</span>
                </div>
                <input class="filter-slider" type="range" id="contrast" min="50" max="200" value="100">
              </div>

              <div class="filter-item">
                <div class="filter-head">
                  <span>彩度</span>
                  <span id="saturateValue">100%</span>
                </div>
                <input class="filter-slider" type="range" id="saturate" min="0" max="300" value="100">
              </div>

              <div class="filter-item">
                <div class="filter-head">
                  <span>グレー</span>
                  <span id="grayscaleValue">0%</span>
                </div>
                <input class="filter-slider" type="range" id="grayscale" min="0" max="100" value="0">
              </div>

              <div class="menu-row">
                <button id="resetFilterButton" class="gray" type="button">画質リセット</button>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <main class="viewer-card">
        <div class="viewer">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>
        <div class="viewer-status">
          <div class="status-card">
            <span class="status-label">現在のモード</span>
            <div id="modeStatus" class="status-value">なし</div>
          </div>
          <div class="status-card">
            <span class="status-label">校正状態</span>
            <div id="calibrationStatus" class="status-value">未校正</div>
          </div>
        </div>
        <canvas id="captureCanvas"></canvas>
      </main>

      <aside class="panel">
        <div class="panel-box">
          <h3 class="panel-title">撮影</h3>
          <div class="stack">
            <button id="captureStillButton" class="capture-red" type="button">静止画撮影</button>
            <button id="recordButton" class="primary" type="button">録画開始</button>
            <label class="inline-check">
              <input type="checkbox" id="recordAudioToggle">
              マイク音声を含める
            </label>
            <select id="cameraSelect"></select>
            <button id="switchCameraButton" class="secondary" type="button">カメラ切り替え</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');
    const captureCanvas = document.getElementById('captureCanvas');

    const captureStillButton = document.getElementById('captureStillButton');
    const recordButton = document.getElementById('recordButton');
    const cameraSelect = document.getElementById('cameraSelect');
    const switchCameraButton = document.getElementById('switchCameraButton');
    const recordAudioToggle = document.getElementById('recordAudioToggle');

    const measureClearButton = document.getElementById('measureClearButton');
    const undoShapeButton = document.getElementById('undoShapeButton');
    const drawLineButton = document.getElementById('drawLineButton');
    const drawRectButton = document.getElementById('drawRectButton');
    const drawCircleButton = document.getElementById('drawCircleButton');

    const calibrationModeButton = document.getElementById('calibrationModeButton');
    const exitCalibrationModeButton = document.getElementById('exitCalibrationModeButton');
    const calibrationLengthInput = document.getElementById('calibrationLength');
    const calibrationUnitSelect = document.getElementById('calibrationUnit');
    const applyCalibrationButton = document.getElementById('applyCalibrationButton');
    const clearCalibrationButton = document.getElementById('clearCalibrationButton');
    const calibrationValueText = document.getElementById('calibrationValueText');
    const calibrationPixelLength = document.getElementById('calibrationPixelLength');
    const modeStatus = document.getElementById('modeStatus');
    const calibrationStatus = document.getElementById('calibrationStatus');

    const brightness = document.getElementById('brightness');
    const contrast = document.getElementById('contrast');
    const saturate = document.getElementById('saturate');
    const grayscale = document.getElementById('grayscale');
    const brightnessValue = document.getElementById('brightnessValue');
    const contrastValue = document.getElementById('contrastValue');
    const saturateValue = document.getElementById('saturateValue');
    const grayscaleValue = document.getElementById('grayscaleValue');
    const resetFilterButton = document.getElementById('resetFilterButton');

    const saveSlotButtons = document.querySelectorAll('.save-slot-button');
    const loadSlotButtons = document.querySelectorAll('.load-slot-button');
    const clearSlotButtons = document.querySelectorAll('.clear-slot-button');
    const renameSlotButtons = document.querySelectorAll('.rename-slot-button');
    const accordionHeaders = document.querySelectorAll('.accordion-header');

    let cameraStream = null;
    let currentVideoDeviceId = null;

    let toolMode = null;
    let calibrationMode = false;
    let isDrawing = false;
    let startPoint = null;
    let previewShape = null;

    let shapes = [];
    let calibrationLine = null;
    let calibrationPreviewVisible = false;

    let calibration = {
      valuePerPixel: null,
      unit: 'mm'
    };

    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let recordingStream = null;
    let recordingAudioTracks = [];

    function updateToolButtons() {
      [drawLineButton, drawRectButton, drawCircleButton].forEach(btn => {
        btn.classList.remove('active-tool');
      });

      if (toolMode === 'line') drawLineButton.classList.add('active-tool');
      if (toolMode === 'rect') drawRectButton.classList.add('active-tool');
      if (toolMode === 'circle') drawCircleButton.classList.add('active-tool');

      calibrationModeButton.classList.toggle('active-tool', calibrationMode);
    }

    function updateModeStatus() {
      if (calibrationMode) {
        modeStatus.textContent = '校正モード';
        return;
      }
      if (toolMode === 'line') {
        modeStatus.textContent = '計測：直線';
        return;
      }
      if (toolMode === 'rect') {
        modeStatus.textContent = '計測：長方形';
        return;
      }
      if (toolMode === 'circle') {
        modeStatus.textContent = '計測：円';
        return;
      }
      modeStatus.textContent = 'なし';
    }

    function updateCalibrationStatusLabel() {
      calibrationStatus.textContent = calibration.valuePerPixel
        ? `校正済み（${calibration.unit}）`
        : '未校正';
    }

    function updateCaptureButtons() {
      const ready = !!cameraStream && !!video.videoWidth && !!video.videoHeight;
      captureStillButton.disabled = !ready;
      recordButton.disabled = !ready;
      switchCameraButton.disabled = cameraSelect.options.length === 0 || isRecording;
      cameraSelect.disabled = isRecording;
      recordAudioToggle.disabled = isRecording;

      if (isRecording) {
        recordButton.textContent = '録画停止';
        recordButton.classList.add('recording');
      } else {
        recordButton.textContent = '録画開始';
        recordButton.classList.remove('recording');
      }
    }

    function updateStatus() {
      if (calibrationLine) {
        const px = distancePx(
          calibrationLine.x1,
          calibrationLine.y1,
          calibrationLine.x2,
          calibrationLine.y2
        );
        calibrationPixelLength.textContent = `${px.toFixed(2)} px`;
      } else {
        calibrationPixelLength.textContent = '未設定';
      }

      if (calibration.valuePerPixel) {
        calibrationValueText.textContent = `1 px = ${calibration.valuePerPixel.toFixed(6)} ${calibration.unit}`;
      } else {
        calibrationValueText.textContent = '未校正';
      }

      undoShapeButton.disabled = shapes.length === 0;

      updateToolButtons();
      updateCaptureButtons();
      updateModeStatus();
      updateCalibrationStatusLabel();
      updateCalibrationSlotsUI();
    }

    function makeTimestamp() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(now.getHours()).padStart(2, '0');
      const mi = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      return `${yyyy}${mm}${dd}_${hh}${mi}${ss}`;
    }

    function autoDownloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function autoDownloadDataUrl(dataUrl, fileName) {
      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function distancePx(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function formatMeasure(pxLength) {
      if (!calibration.valuePerPixel) {
        return `${pxLength.toFixed(1)} px`;
      }
      const realValue = pxLength * calibration.valuePerPixel;
      return `${realValue.toFixed(3)} ${calibration.unit}`;
    }

    function getRectSize(shape) {
      return {
        w: Math.abs(shape.x2 - shape.x1),
        h: Math.abs(shape.y2 - shape.y1)
      };
    }

    function getCircleRadius(shape) {
      const rx = Math.abs(shape.x2 - shape.x1) / 2;
      const ry = Math.abs(shape.y2 - shape.y1) / 2;
      return (rx + ry) / 2;
    }

    function getShapeLabel(shape) {
      if (shape.type === 'line') {
        return `長さ: ${formatMeasure(distancePx(shape.x1, shape.y1, shape.x2, shape.y2))}`;
      }
      if (shape.type === 'rect') {
        const { w, h } = getRectSize(shape);
        return `W:${formatMeasure(w)}  H:${formatMeasure(h)}`;
      }
      if (shape.type === 'circle') {
        return `半径: ${formatMeasure(getCircleRadius(shape))}`;
      }
      return null;
    }

    async function loadCameras() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(device => device.kind === 'videoinput');
        const currentValue = cameraSelect.value || currentVideoDeviceId || '';
        cameraSelect.innerHTML = '';

        cameras.forEach((camera, index) => {
          const option = document.createElement('option');
          option.value = camera.deviceId;
          option.textContent = camera.label || `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });

        if ([...cameraSelect.options].some(opt => opt.value === currentValue)) {
          cameraSelect.value = currentValue;
        } else if (cameraSelect.options.length > 0) {
          cameraSelect.selectedIndex = 0;
          currentVideoDeviceId = cameraSelect.value;
        }
      } catch (err) {
        console.error(`カメラ一覧取得失敗: ${err.name} / ${err.message}`);
      }
      updateStatus();
    }

    function stopTracks(stream) {
      if (!stream) return;
      stream.getTracks().forEach(track => track.stop());
    }

    function stopOnlyTracks(tracks) {
      if (!tracks || !tracks.length) return;
      tracks.forEach(track => {
        try {
          track.stop();
        } catch (_) {}
      });
    }

    async function waitForVideoReady() {
      if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) return;

      await new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('動画の準備がタイムアウトしました'));
        }, 5000);

        function onReady() {
          if (video.videoWidth > 0 && video.videoHeight > 0) {
            cleanup();
            resolve();
          }
        }

        function cleanup() {
          clearTimeout(timeout);
          video.removeEventListener('loadedmetadata', onReady);
          video.removeEventListener('canplay', onReady);
        }

        video.addEventListener('loadedmetadata', onReady);
        video.addEventListener('canplay', onReady);
      });
    }

    async function startDefaultCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        const videoTrack = cameraStream.getVideoTracks()[0];
        currentVideoDeviceId = videoTrack?.getSettings?.().deviceId || currentVideoDeviceId;

        video.srcObject = cameraStream;
        await waitForVideoReady();
        await video.play();

        await loadCameras();
        resizeOverlay();
        updateStatus();
        return true;
      } catch (err) {
        console.error(`カメラ起動失敗: ${err.name || 'Error'} / ${err.message}`);
        updateStatus();
        return false;
      }
    }

    async function switchCamera() {
      const deviceId = cameraSelect.value;
      if (!deviceId || isRecording) return;

      try {
        stopTracks(cameraStream);

        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: { exact: deviceId } },
          audio: false
        });

        currentVideoDeviceId = deviceId;
        video.srcObject = cameraStream;
        await waitForVideoReady();
        await video.play();

        resizeOverlay();
        updateStatus();
      } catch (err) {
        console.error(`切替失敗: ${err.name || 'Error'} / ${err.message}`);
        updateStatus();
      }
    }

    async function buildRecordingStream(includeAudio) {
      const tracks = [];
      recordingAudioTracks = [];

      const videoTrack = cameraStream?.getVideoTracks?.()[0];
      if (!videoTrack) throw new Error('映像トラックが取得できません');
      tracks.push(videoTrack);

      if (includeAudio) {
        const micStream = await navigator.mediaDevices.getUserMedia({
          video: false,
          audio: true
        });
        const audioTrack = micStream.getAudioTracks()[0];
        if (audioTrack) {
          tracks.push(audioTrack);
          recordingAudioTracks.push(audioTrack);
        }
      }

      return new MediaStream(tracks);
    }

    function resizeOverlay() {
      const rect = video.getBoundingClientRect();
      if (!rect.width || !rect.height) return;
      overlay.width = rect.width;
      overlay.height = rect.height;
      overlay.style.width = rect.width + 'px';
      overlay.style.height = rect.height + 'px';
      redraw();
    }

    function setToolMode(mode) {
      toolMode = toolMode === mode ? null : mode;
      calibrationMode = false;
      calibrationPreviewVisible = false;
      isDrawing = false;
      startPoint = null;
      previewShape = null;
      redraw();
      updateStatus();
    }

    function setCalibrationMode(on) {
      calibrationMode = on;
      if (on) {
        toolMode = null;
        calibrationPreviewVisible = true;
        openAccordion('calibrationMenu');
      } else {
        calibrationPreviewVisible = false;
      }
      isDrawing = false;
      startPoint = null;
      previewShape = null;
      redraw();
      updateStatus();
    }

    function getPoint(event) {
      const rect = overlay.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function drawLabel(text, x, y) {
      ctx.save();
      ctx.font = '600 15px "Segoe UI", sans-serif';
      const pad = 6;
      const m = ctx.measureText(text);
      const w = m.width + pad * 2;
      const h = 24;
      ctx.fillStyle = 'rgba(10, 25, 35, 0.72)';
      ctx.fillRect(x, y - h + 4, w, h);
      ctx.fillStyle = '#fff';
      ctx.fillText(text, x + pad, y);
      ctx.restore();
    }

    function drawShape(shape, isPreview = false) {
      ctx.save();
      ctx.strokeStyle = isPreview ? '#00bcd4' : '#ffe44d';
      ctx.lineWidth = 2.2;

      if (shape.type === 'line') {
        ctx.beginPath();
        ctx.moveTo(shape.x1, shape.y1);
        ctx.lineTo(shape.x2, shape.y2);
        ctx.stroke();
      }

      if (shape.type === 'rect') {
        const x = Math.min(shape.x1, shape.x2);
        const y = Math.min(shape.y1, shape.y2);
        const w = Math.abs(shape.x2 - shape.x1);
        const h = Math.abs(shape.y2 - shape.y1);
        ctx.strokeRect(x, y, w, h);
      }

      if (shape.type === 'circle') {
        const cx = (shape.x1 + shape.x2) / 2;
        const cy = (shape.y1 + shape.y2) / 2;
        const rx = Math.abs(shape.x2 - shape.x1) / 2;
        const ry = Math.abs(shape.y2 - shape.y1) / 2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (!isPreview) {
        const label = getShapeLabel(shape);
        if (label) {
          let lx = 0;
          let ly = 0;

          if (shape.type === 'line') {
            lx = (shape.x1 + shape.x2) / 2 + 8;
            ly = (shape.y1 + shape.y2) / 2 - 8;
          } else if (shape.type === 'rect') {
            lx = Math.min(shape.x1, shape.x2) + 8;
            ly = Math.min(shape.y1, shape.y2) - 8;
          } else if (shape.type === 'circle') {
            lx = (shape.x1 + shape.x2) / 2 + 8;
            ly = (shape.y1 + shape.y2) / 2 - 8;
          }

          drawLabel(label, lx, ly);
        }
      }

      ctx.restore();
    }

    function drawCalibrationLine(line, isPreview = false) {
      if (!line) return;

      ctx.save();
      ctx.strokeStyle = isPreview ? '#ff7faf' : '#ff4f87';
      ctx.lineWidth = 2.2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(line.x1, line.y1);
      ctx.lineTo(line.x2, line.y2);
      ctx.stroke();
      ctx.setLineDash([]);

      const px = distancePx(line.x1, line.y1, line.x2, line.y2);
      drawLabel(`校正線: ${px.toFixed(1)} px`, (line.x1 + line.x2) / 2 + 8, (line.y1 + line.y2) / 2 - 8);
      ctx.restore();
    }

    function redraw() {
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      shapes.forEach(shape => drawShape(shape, false));

      if (calibrationPreviewVisible && calibrationLine) {
        drawCalibrationLine(calibrationLine, false);
      }

      if (previewShape) {
        if (previewShape.type === 'calibration') {
          drawCalibrationLine(previewShape, true);
        } else {
          drawShape(previewShape, true);
        }
      }
    }

    overlay.addEventListener('mousedown', (event) => {
      if (!toolMode && !calibrationMode) return;
      isDrawing = true;
      startPoint = getPoint(event);
      previewShape = null;
    });

    overlay.addEventListener('mousemove', (event) => {
      if (!isDrawing || !startPoint) return;
      const p = getPoint(event);

      if (calibrationMode) {
        previewShape = {
          type: 'calibration',
          x1: startPoint.x,
          y1: startPoint.y,
          x2: p.x,
          y2: p.y
        };
      } else if (toolMode) {
        previewShape = {
          type: toolMode,
          x1: startPoint.x,
          y1: startPoint.y,
          x2: p.x,
          y2: p.y
        };
      }

      redraw();
    });

    overlay.addEventListener('mouseup', (event) => {
      if (!isDrawing || !startPoint) return;
      const p = getPoint(event);

      if (calibrationMode) {
        calibrationLine = {
          type: 'calibration',
          x1: startPoint.x,
          y1: startPoint.y,
          x2: p.x,
          y2: p.y
        };
      } else if (toolMode) {
        shapes.push({
          type: toolMode,
          x1: startPoint.x,
          y1: startPoint.y,
          x2: p.x,
          y2: p.y
        });
      }

      isDrawing = false;
      startPoint = null;
      previewShape = null;
      redraw();
      updateStatus();
    });

    overlay.addEventListener('mouseleave', () => {
      if (!isDrawing) return;
      isDrawing = false;
      startPoint = null;
      previewShape = null;
      redraw();
    });

    function applyCalibration() {
      try {
        if (!calibrationLine) return;

        const actualLength = parseFloat(calibrationLengthInput.value);
        if (!isFinite(actualLength) || actualLength <= 0) return;

        const px = distancePx(
          calibrationLine.x1,
          calibrationLine.y1,
          calibrationLine.x2,
          calibrationLine.y2
        );
        if (px <= 0) return;

        calibration.valuePerPixel = actualLength / px;
        calibration.unit = calibrationUnitSelect.value;

        calibrationPreviewVisible = false;
        previewShape = null;
        redraw();
        updateStatus();
      } catch (err) {
        console.error(`校正適用失敗: ${err.name || 'Error'} / ${err.message}`);
      }
    }

    function clearCalibration() {
      calibrationLine = null;
      calibration.valuePerPixel = null;
      calibration.unit = calibrationUnitSelect.value;
      calibrationPreviewVisible = false;
      previewShape = null;
      redraw();
      updateStatus();
    }

    function getCalibrationStorageKey(slot) {
      return `microscopeCalibrationSlot_${slot}`;
    }

    function getCalibrationNameKey(slot) {
      return `microscopeCalibrationSlotName_${slot}`;
    }

    function getSlotMetaElement(slot) {
      return document.getElementById(`slotMeta${slot}`);
    }

    function getSlotTitleElement(slot) {
      return document.getElementById(`slotTitle${slot}`);
    }

    function getSlotInputElement(slot) {
      return document.getElementById(`slotName${slot}`);
    }

    function getSlotDisplayName(slot) {
      const saved = localStorage.getItem(getCalibrationNameKey(slot));
      return saved && saved.trim() ? saved.trim() : `校正スロット ${slot}`;
    }

    function saveSlotName(slot) {
      const input = getSlotInputElement(slot);
      const name = (input.value || '').trim();
      if (name) {
        localStorage.setItem(getCalibrationNameKey(slot), name);
      } else {
        localStorage.removeItem(getCalibrationNameKey(slot));
      }
      updateCalibrationSlotsUI();
    }

    function formatSavedAt(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const hh = String(date.getHours()).padStart(2, '0');
      const mm = String(date.getMinutes()).padStart(2, '0');
      return `${y}/${m}/${d} ${hh}:${mm}`;
    }

    function saveCalibrationToSlot(slot) {
      try {
        if (!calibration.valuePerPixel || !calibrationLine) return;

        const existing = localStorage.getItem(getCalibrationStorageKey(slot));
        if (existing) {
          const ok = confirm(`${getSlotDisplayName(slot)} はすでに保存されています。上書きしてよろしいですか？`);
          if (!ok) return;
        }

        const payload = {
          calibration,
          calibrationLine,
          calibrationLength: calibrationLengthInput.value,
          calibrationUnit: calibrationUnitSelect.value,
          slotName: getSlotDisplayName(slot),
          savedAt: new Date().toISOString()
        };

        localStorage.setItem(getCalibrationStorageKey(slot), JSON.stringify(payload));
        updateCalibrationSlotsUI();
      } catch (err) {
        console.error(`校正スロット保存失敗: ${err.name || 'Error'} / ${err.message}`);
      }
    }

    function loadCalibrationFromSlot(slot) {
      try {
        const raw = localStorage.getItem(getCalibrationStorageKey(slot));
        if (!raw) return;

        const data = JSON.parse(raw);
        calibration = data.calibration || { valuePerPixel: null, unit: 'mm' };
        calibrationLine = data.calibrationLine || null;
        calibrationLengthInput.value = data.calibrationLength || '1';
        calibrationUnitSelect.value = data.calibrationUnit || 'mm';

        calibrationPreviewVisible = false;
        previewShape = null;
        redraw();
        updateStatus();
        openAccordion('calibrationMenu');
      } catch (err) {
        console.error(`校正スロット読込失敗: ${err.name || 'Error'} / ${err.message}`);
      }
    }

    function clearCalibrationSlot(slot) {
      localStorage.removeItem(getCalibrationStorageKey(slot));
      updateCalibrationSlotsUI();
    }

    function updateCalibrationSlotsUI() {
      for (let i = 1; i <= 4; i++) {
        const titleEl = getSlotTitleElement(i);
        const inputEl = getSlotInputElement(i);
        const metaEl = getSlotMetaElement(i);

        const displayName = getSlotDisplayName(i);
        titleEl.textContent = displayName;
        if (document.activeElement !== inputEl) {
          inputEl.value = displayName.startsWith('校正スロット ') ? '' : displayName;
        }

        const raw = localStorage.getItem(getCalibrationStorageKey(i));
        if (!raw) {
          metaEl.textContent = '未保存';
          continue;
        }

        try {
          const data = JSON.parse(raw);
          const savedAt = data.savedAt ? formatSavedAt(new Date(data.savedAt)) : '日時不明';
          const val = data.calibration?.valuePerPixel;
          const unit = data.calibration?.unit || 'mm';
          const len = data.calibrationLength || '-';

          if (val) {
            metaEl.textContent =
              `保存: ${savedAt}\n実長: ${len} ${unit}\n1 px = ${Number(val).toFixed(6)} ${unit}`;
          } else {
            metaEl.textContent = `保存: ${savedAt}\n内容不明`;
          }
        } catch {
          metaEl.textContent = '読込不可データ';
        }
      }
    }

    function applyFilters() {
      document.documentElement.style.setProperty('--brightness', brightness.value / 100);
      document.documentElement.style.setProperty('--contrast', contrast.value / 100);
      document.documentElement.style.setProperty('--saturate', saturate.value / 100);
      document.documentElement.style.setProperty('--grayscale', grayscale.value / 100);

      brightnessValue.textContent = brightness.value + '%';
      contrastValue.textContent = contrast.value + '%';
      saturateValue.textContent = saturate.value + '%';
      grayscaleValue.textContent = grayscale.value + '%';
    }

    function resetFilters() {
      brightness.value = 100;
      contrast.value = 100;
      saturate.value = 100;
      grayscale.value = 0;
      applyFilters();
    }

    function drawCapturedOverlay(cctx, scaleX, scaleY) {
      const s = Math.max(scaleX, scaleY);
      cctx.save();
      cctx.lineWidth = 2 * s;

      for (const shape of shapes) {
        cctx.strokeStyle = '#ffe44d';

        if (shape.type === 'line') {
          cctx.beginPath();
          cctx.moveTo(shape.x1 * scaleX, shape.y1 * scaleY);
          cctx.lineTo(shape.x2 * scaleX, shape.y2 * scaleY);
          cctx.stroke();
        }

        if (shape.type === 'rect') {
          cctx.strokeRect(
            Math.min(shape.x1, shape.x2) * scaleX,
            Math.min(shape.y1, shape.y2) * scaleY,
            Math.abs(shape.x2 - shape.x1) * scaleX,
            Math.abs(shape.y2 - shape.y1) * scaleY
          );
        }

        if (shape.type === 'circle') {
          cctx.beginPath();
          cctx.ellipse(
            ((shape.x1 + shape.x2) / 2) * scaleX,
            ((shape.y1 + shape.y2) / 2) * scaleY,
            Math.abs(shape.x2 - shape.x1) / 2 * scaleX,
            Math.abs(shape.y2 - shape.y1) / 2 * scaleY,
            0,
            0,
            Math.PI * 2
          );
          cctx.stroke();
        }

        const label = getShapeLabel(shape);
        if (label) {
          let lx = 0;
          let ly = 0;

          if (shape.type === 'line') {
            lx = ((shape.x1 + shape.x2) / 2) * scaleX + 8;
            ly = ((shape.y1 + shape.y2) / 2) * scaleY - 8;
          } else if (shape.type === 'rect') {
            lx = Math.min(shape.x1, shape.x2) * scaleX + 8;
            ly = Math.min(shape.y1, shape.y2) * scaleY - 8;
          } else if (shape.type === 'circle') {
            lx = ((shape.x1 + shape.x2) / 2) * scaleX + 8;
            ly = ((shape.y1 + shape.y2) / 2) * scaleY - 8;
          }

          cctx.font = `${15 * s}px "Segoe UI", sans-serif`;
          const pad = 5 * s;
          const m = cctx.measureText(label);
          const w = m.width + pad * 2;
          const h = 24 * s;
          cctx.fillStyle = 'rgba(10, 25, 35, 0.72)';
          cctx.fillRect(lx, ly - h + 4, w, h);
          cctx.fillStyle = '#fff';
          cctx.fillText(label, lx + pad, ly);
        }
      }

      cctx.restore();
    }

    function captureStillImageDataUrl() {
      captureCanvas.width = video.videoWidth;
      captureCanvas.height = video.videoHeight;
      const cctx = captureCanvas.getContext('2d');

      cctx.filter = `
        brightness(${brightness.value / 100})
        contrast(${contrast.value / 100})
        saturate(${saturate.value / 100})
        grayscale(${grayscale.value / 100})
      `;

      cctx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
      cctx.filter = 'none';

      const scaleX = captureCanvas.width / overlay.width;
      const scaleY = captureCanvas.height / overlay.height;
      drawCapturedOverlay(cctx, scaleX, scaleY);

      return captureCanvas.toDataURL('image/png');
    }

    async function captureStill() {
      try {
        if (!cameraStream || !video.videoWidth || !video.videoHeight) return;
        const dataUrl = captureStillImageDataUrl();
        autoDownloadDataUrl(dataUrl, `microscope_${makeTimestamp()}.png`);
      } catch (err) {
        console.error(`静止画撮影失敗: ${err.name || 'Error'} / ${err.message}`);
      }
    }

    function getSupportedMimeType() {
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm',
        'video/mp4'
      ];

      for (const type of candidates) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      }
      return '';
    }

    async function startRecording() {
      try {
        if (!cameraStream || isRecording) return;

        const includeAudio = !!recordAudioToggle.checked;
        recordingStream = await buildRecordingStream(includeAudio);

        const mimeType = getSupportedMimeType();
        recordedChunks = [];

        mediaRecorder = mimeType
          ? new MediaRecorder(recordingStream, { mimeType })
          : new MediaRecorder(recordingStream);

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            recordedChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          try {
            if (recordedChunks.length) {
              const type = mediaRecorder.mimeType || 'video/webm';
              const ext = type.includes('mp4') ? 'mp4' : 'webm';
              const blob = new Blob(recordedChunks, { type });
              autoDownloadBlob(blob, `microscope_${makeTimestamp()}.${ext}`);
            }
          } finally {
            recordedChunks = [];
            isRecording = false;
            stopOnlyTracks(recordingAudioTracks);
            recordingAudioTracks = [];

            if (recordingStream) {
              recordingStream.getAudioTracks().forEach(track => {
                try { recordingStream.removeTrack(track); } catch (_) {}
              });
            }

            recordingStream = null;
            mediaRecorder = null;
            updateStatus();
          }
        };

        mediaRecorder.start();
        isRecording = true;
        updateStatus();
      } catch (err) {
        console.error(`録画開始失敗: ${err.name || 'Error'} / ${err.message}`);
        isRecording = false;
        stopOnlyTracks(recordingAudioTracks);
        recordingAudioTracks = [];
        recordingStream = null;
        mediaRecorder = null;
        updateStatus();
      }
    }

    function stopRecordingIfNeeded(downloadOnStop = true) {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        isRecording = false;
        updateStatus();
        return;
      }

      if (!downloadOnStop) {
        mediaRecorder.onstop = () => {
          recordedChunks = [];
          isRecording = false;
          stopOnlyTracks(recordingAudioTracks);
          recordingAudioTracks = [];
          recordingStream = null;
          mediaRecorder = null;
          updateStatus();
        };
      }

      mediaRecorder.stop();
    }

    function openAccordion(targetId) {
      document.querySelectorAll('.accordion-body').forEach(body => {
        body.classList.remove('open');
      });
      document.querySelectorAll('.accordion-arrow').forEach(arrow => {
        arrow.textContent = '▼';
      });

      const body = document.getElementById(targetId);
      if (!body) return;
      body.classList.add('open');

      const header = document.querySelector(`.accordion-header[data-target="${targetId}"]`);
      if (header) {
        const arrow = header.querySelector('.accordion-arrow');
        if (arrow) arrow.textContent = '▲';
      }
    }

    function toggleAccordion(targetId) {
      const body = document.getElementById(targetId);
      if (!body) return;

      const isOpen = body.classList.contains('open');

      document.querySelectorAll('.accordion-body').forEach(el => el.classList.remove('open'));
      document.querySelectorAll('.accordion-arrow').forEach(arrow => arrow.textContent = '▼');

      if (!isOpen) {
        body.classList.add('open');
        const header = document.querySelector(`.accordion-header[data-target="${targetId}"]`);
        if (header) {
          const arrow = header.querySelector('.accordion-arrow');
          if (arrow) arrow.textContent = '▲';
        }
      }
    }

    accordionHeaders.forEach(header => {
      header.addEventListener('click', () => {
        toggleAccordion(header.dataset.target);
      });
    });

    captureStillButton.addEventListener('click', captureStill);

    recordButton.addEventListener('click', async () => {
      if (!isRecording) {
        await startRecording();
      } else {
        stopRecordingIfNeeded(true);
      }
    });

    switchCameraButton.addEventListener('click', switchCamera);

    measureClearButton.addEventListener('click', () => {
      shapes = [];
      previewShape = null;
      toolMode = null;
      redraw();
      updateStatus();
    });

    undoShapeButton.addEventListener('click', () => {
      if (shapes.length > 0) {
        shapes.pop();
        redraw();
        updateStatus();
      }
    });

    drawLineButton.addEventListener('click', () => {
      setToolMode('line');
      openAccordion('measureMenu');
    });

    drawRectButton.addEventListener('click', () => {
      setToolMode('rect');
      openAccordion('measureMenu');
    });

    drawCircleButton.addEventListener('click', () => {
      setToolMode('circle');
      openAccordion('measureMenu');
    });

    calibrationModeButton.addEventListener('click', () => setCalibrationMode(!calibrationMode));
    exitCalibrationModeButton.addEventListener('click', () => setCalibrationMode(false));
    applyCalibrationButton.addEventListener('click', applyCalibration);
    clearCalibrationButton.addEventListener('click', clearCalibration);

    renameSlotButtons.forEach(button => {
      button.addEventListener('click', () => {
        saveSlotName(Number(button.dataset.slot));
      });
    });

    saveSlotButtons.forEach(button => {
      button.addEventListener('click', () => {
        saveCalibrationToSlot(Number(button.dataset.slot));
      });
    });

    loadSlotButtons.forEach(button => {
      button.addEventListener('click', () => {
        loadCalibrationFromSlot(Number(button.dataset.slot));
      });
    });

    clearSlotButtons.forEach(button => {
      button.addEventListener('click', () => {
        clearCalibrationSlot(Number(button.dataset.slot));
      });
    });

    brightness.addEventListener('input', applyFilters);
    contrast.addEventListener('input', applyFilters);
    saturate.addEventListener('input', applyFilters);
    grayscale.addEventListener('input', applyFilters);
    resetFilterButton.addEventListener('click', resetFilters);

    video.addEventListener('loadedmetadata', () => {
      resizeOverlay();
      updateStatus();
    });

    video.addEventListener('canplay', () => {
      resizeOverlay();
      updateStatus();
    });

    window.addEventListener('resize', resizeOverlay);
    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try { mediaRecorder.stop(); } catch (_) {}
      }
      stopOnlyTracks(recordingAudioTracks);
      stopTracks(cameraStream);
    });

    window.addEventListener('load', async () => {
      applyFilters();
      updateCalibrationSlotsUI();
      updateStatus();
      openAccordion('measureMenu');
      await startDefaultCamera();
    });
  </script>
</body>
</html>
